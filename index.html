<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>⚽ ทายผล World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    /* ──────────────── CSS Variables ──────────────── */
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1c2333;
      --border: #2a3550;
      --accent: #3b82f6;
      --accent2: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --radius: 14px;
      --font-body: 'Sarabun', sans-serif;
      --font-display: 'Bebas Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* ──────────────── Header ──────────────── */
    .app-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      padding: 16px 20px 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--accent2);
      line-height: 1;
    }
    .app-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ──────────────── Login Screen ──────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 24px;
      gap: 24px;
      text-align: center;
    }
    .login-icon { font-size: 64px; }
    .login-title {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--accent2);
    }
    .login-desc { color: var(--muted); font-size: 15px; line-height: 1.6; }
    .btn-line {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #06c755;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(6,199,85,.35);
    }
    .btn-line:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(6,199,85,.45); }
    .btn-line svg { width: 24px; height: 24px; }

    /* ──────────────── Main App ──────────────── */
    #main-app { display: none; }

    /* ──────────────── Profile Card ──────────────── */
    .profile-card {
      background: var(--surface);
      margin: 16px;
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
    }
    .profile-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name { font-weight: 700; font-size: 17px; }
    .profile-points {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 14px;
      color: var(--accent2);
    }
    .points-badge {
      background: rgba(245,158,11,.15);
      border: 1px solid var(--accent2);
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 700;
      font-size: 15px;
    }

    /* ──────────────── Section Wrapper ──────────────── */
    .section {
      margin: 0 16px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 15px;
    }
    .section-header .icon { font-size: 18px; }
    .section-body { padding: 16px; }

    /* ──────────────── Champion Picks ──────────────── */
    .champion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pick-slot {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: border-color .2s;
    }
    .pick-slot.filled {
      border: 2px solid var(--accent);
      background: rgba(59,130,246,.08);
    }
    .pick-slot .team-flag { font-size: 28px; }
    .pick-slot .team-name { font-size: 13px; font-weight: 600; }
    .pick-slot .remove-btn {
      font-size: 10px;
      color: var(--red);
      cursor: pointer;
      margin-top: 2px;
    }
    .pick-slot .slot-label { font-size: 12px; color: var(--muted); }
    .deadline-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 12px;
    }

    /* Team search */
    .team-search-wrap { position: relative; }
    .team-search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }
    .team-search-input:focus { border-color: var(--accent); }
    .team-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 50;
    }
    .team-dropdown.open { display: block; }
    .team-option {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .team-option:hover { background: var(--border); }

    /* Save button */
    .btn-save {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }

    /* ──────────────── Leaderboard ──────────────── */
    .leaderboard-toggle {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .leaderboard-content { display: none; }
    .leaderboard-content.open { display: block; }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }
    .lb-rank {
      font-family: var(--font-display);
      font-size: 20px;
      width: 28px;
      text-align: center;
      color: var(--muted);
    }
    .lb-rank.gold { color: #f59e0b; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #b45309; }
    .lb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    .lb-name { flex: 1; font-size: 14px; font-weight: 600; }
    .lb-points {
      font-weight: 700;
      color: var(--accent2);
      font-size: 15px;
    }
    .lb-stats { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .lb-prize {
      font-size: 11px;
      color: var(--green);
    }

    /* ──────────────── Match List ──────────────── */
    .match-filter {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .match-filter::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .match-card {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }
    .match-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .team-side { text-align: center; }
    .team-side .flag { font-size: 24px; display: block; }
    .team-side .name { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .score-center { text-align: center; }
    .score-display {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .score-vs {
      font-size: 13px;
      color: var(--muted);
    }
    .match-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }
    .predict-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
    }
    .predict-btn:hover { border-color: var(--accent); }
    .predict-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .predict-score-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      grid-column: span 2;
    }
    .score-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    .score-input:focus { border-color: var(--accent2); }
    .score-dash { line-height: 32px; color: var(--muted); }
    .save-match-btn {
      background: var(--green);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .match-predicted {
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 6px;
      font-size: 12px;
      color: var(--green);
      display: flex;
      gap: 6px;
    }

    /* ──────────────── Loading ──────────────── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ──────────────── Toast ──────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 14px;
      transition: transform .3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ──────────────── Modal ──────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title { font-weight: 700; font-size: 17px; margin-bottom: 16px; }

    .result-buttons { display: flex; gap: 8px; }
    .result-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
    }
    .result-btn.selected { border-color: var(--accent); background: rgba(59,130,246,.15); }
    .result-btn.win { border-color: var(--green); }
    .result-btn.draw { border-color: var(--accent2); }
    .result-btn.lose { border-color: var(--red); }
  </style>
</head>
<body>

<div class="app-header">
  <h1>⚽ WORLD CUP 2026</h1>
  <p>Canada · Mexico · USA</p>
</div>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-icon">🏆</div>
  <div class="login-title">ทายผลบอลโลก 2026</div>
  <div class="login-desc">
    สะสมแต้ม ทายผล ทายสกอร์ และทายแชมป์<br/>
    ลุ้นเงินรางวัลกับเพื่อนในวง!
  </div>
  <button class="btn-line" onclick="loginWithLine()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M19.952 12.457c0-4.4-4.41-7.98-9.828-7.98C4.706 4.477.3 8.057.3 12.457c0 3.944 3.497 7.244 8.22 7.867.32.069.756.211.866.485.099.25.065.64.032.89l-.14.84c-.043.25-.197.975.855.531 1.052-.443 5.676-3.34 7.744-5.718C19.33 15.4 19.952 14 19.952 12.457z"/></svg>
    เข้าสู่ระบบด้วย LINE
  </button>
</div>

<!-- Main App -->
<div id="main-app">

  <!-- Profile -->
  <div class="profile-card">
    <img id="user-avatar" class="profile-avatar" src="" alt="avatar" />
    <div class="profile-info">
      <div class="profile-name" id="user-name">-</div>
      <div class="profile-points">
        <span>คะแนนของฉัน</span>
        <span class="points-badge" id="user-points">0 pt</span>
      </div>
    </div>
  </div>

  <!-- Champion Picks -->
  <div class="section">
    <div class="section-header">
      <span class="icon">🥇</span>
      <span>ทายทีมแชมป์ (เลือกได้ 2 ทีม)</span>
    </div>
    <div class="section-body">
      <div class="deadline-note" id="champion-deadline">⏰ เปลี่ยนได้ถึง: --/--/----</div>
      <div class="champion-grid">
        <div class="pick-slot" id="pick-slot-1">
          <span class="slot-label">ทีมที่ 1</span>
        </div>
        <div class="pick-slot" id="pick-slot-2">
          <span class="slot-label">ทีมที่ 2</span>
        </div>
      </div>
      <div class="team-search-wrap">
        <input type="text" class="team-search-input" id="team-search" placeholder="🔍 ค้นหาทีม..." autocomplete="off" oninput="filterTeams(this.value)" />
        <div class="team-dropdown" id="team-dropdown"></div>
      </div>
      <button class="btn-save" id="save-champion-btn" onclick="saveChampionPicks()">💾 บันทึกทีมแชมป์</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="section">
    <button class="leaderboard-toggle" onclick="toggleLeaderboard()">
      <span>🏅 ตารางคะแนน</span>
      <span id="lb-arrow">▼</span>
    </button>
    <div class="leaderboard-content" id="leaderboard-content">
      <div id="leaderboard-body">
        <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- Match List -->
  <div class="section">
    <div class="section-header">
      <span class="icon">📋</span>
      <span>รายการแมตช์</span>
    </div>
    <div class="match-filter">
      <button class="filter-btn active" onclick="filterMatches('all',this)">ทั้งหมด</button>
      <button class="filter-btn" onclick="filterMatches('upcoming',this)">กำลังจะแข่ง</button>
      <button class="filter-btn" onclick="filterMatches('live',this)">🔴 LIVE</button>
      <button class="filter-btn" onclick="filterMatches('finished',this)">จบแล้ว</button>
    </div>
    <div id="match-list">
      <div class="loading"><div class="spinner"></div>กำลังโหลดแมตช์...</div>
    </div>
  </div>

</div><!-- /#main-app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG — แก้ค่าเหล่านี้ก่อน deploy
// ══════════════════════════════════════════════
const CONFIG = {
  GAS_URL:      'YOUR_GAS_WEB_APP_URL',          // URL จาก GAS Deploy as Web App
  LINE_CLIENT_ID: 'YOUR_LINE_CHANNEL_ID',         // จาก LINE Developers Console
  REDIRECT_URI:   'YOUR_GITHUB_PAGES_URL',        // https://yourusername.github.io/yourrepo/
  LIFF_ID:        'YOUR_LIFF_ID',                 // จาก LINE Developers → LIFF
};

// ══════════════════════════════════════════════
//  World Cup 2026 Teams
// ══════════════════════════════════════════════
const TEAMS = [
  {name:'Argentina',flag:'🇦🇷'},{name:'France',flag:'🇫🇷'},{name:'Brazil',flag:'🇧🇷'},
  {name:'England',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{name:'Spain',flag:'🇪🇸'},{name:'Germany',flag:'🇩🇪'},
  {name:'Portugal',flag:'🇵🇹'},{name:'Netherlands',flag:'🇳🇱'},{name:'Belgium',flag:'🇧🇪'},
  {name:'Uruguay',flag:'🇺🇾'},{name:'Croatia',flag:'🇭🇷'},{name:'Morocco',flag:'🇲🇦'},
  {name:'USA',flag:'🇺🇸'},{name:'Mexico',flag:'🇲🇽'},{name:'Canada',flag:'🇨🇦'},
  {name:'Japan',flag:'🇯🇵'},{name:'South Korea',flag:'🇰🇷'},{name:'Australia',flag:'🇦🇺'},
  {name:'Senegal',flag:'🇸🇳'},{name:'Nigeria',flag:'🇳🇬'},{name:'Ghana',flag:'🇬🇭'},
  {name:'Ecuador',flag:'🇪🇨'},{name:'Colombia',flag:'🇨🇴'},{name:'Chile',flag:'🇨🇱'},
  {name:'Poland',flag:'🇵🇱'},{name:'Switzerland',flag:'🇨🇭'},{name:'Denmark',flag:'🇩🇰'},
  {name:'Serbia',flag:'🇷🇸'},{name:'Turkey',flag:'🇹🇷'},{name:'Iran',flag:'🇮🇷'},
  {name:'Saudi Arabia',flag:'🇸🇦'},{name:'Qatar',flag:'🇶🇦'},{name:'Thailand',flag:'🇹🇭'},
];

// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
let state = {
  user: null,         // {lineId, name, picture, points}
  championPicks: [],  // [{name,flag}, {name,flag}]
  predictions: {},    // {matchId: {result, home, away}}
  matches: [],        // from GAS
  leaderboard: [],    // from GAS
  currentFilter: 'all',
};

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('load', async () => {
  // Check LINE callback
  const params = new URLSearchParams(location.search);
  if (params.get('code')) {
    await handleLineCallback(params.get('code'), params.get('state'));
    return;
  }
  // Check stored session
  const stored = localStorage.getItem('wc2026_user');
  if (stored) {
    state.user = JSON.parse(stored);
    await showMainApp();
  }
});

// ══════════════════════════════════════════════
//  LINE LOGIN
// ══════════════════════════════════════════════
function loginWithLine() {
  const nonce = Math.random().toString(36).slice(2);
  sessionStorage.setItem('line_state', nonce);
  const url = new URL('https://access.line.me/oauth2/v2.1/authorize');
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('client_id', CONFIG.LINE_CLIENT_ID);
  url.searchParams.set('redirect_uri', CONFIG.REDIRECT_URI);
  url.searchParams.set('state', nonce);
  url.searchParams.set('scope', 'profile openid');
  location.href = url.toString();
}

async function handleLineCallback(code, lineState) {
  if (lineState !== sessionStorage.getItem('line_state')) {
    showToast('❌ State mismatch', 'error');
    return;
  }
  // Exchange code via GAS (GAS handles token exchange server-side)
  try {
    const res = await gasCall('lineLogin', { code, redirectUri: CONFIG.REDIRECT_URI });
    state.user = res.user;
    localStorage.setItem('wc2026_user', JSON.stringify(state.user));
    history.replaceState({}, '', location.pathname);
    await showMainApp();
  } catch(e) {
    showToast('❌ Login failed: ' + e.message, 'error');
  }
}

// ══════════════════════════════════════════════
//  GAS API CALL
// ══════════════════════════════════════════════
async function gasCall(action, params = {}) {
  const payload = { action, lineId: state.user?.lineId, ...params };
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.message || 'Error');
  return data;
}

// ══════════════════════════════════════════════
//  SHOW MAIN APP
// ══════════════════════════════════════════════
async function showMainApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';

  // Profile
  document.getElementById('user-name').textContent = state.user.name;
  document.getElementById('user-avatar').src = state.user.picture || 'https://via.placeholder.com/56';
  document.getElementById('user-points').textContent = (state.user.points || 0) + ' pt';

  // Load data
  await Promise.all([
    loadUserData(),
    loadMatches(),
  ]);
}

async function loadUserData() {
  try {
    const res = await gasCall('getUserData');
    state.user.points = res.points;
    state.championPicks = res.championPicks || [];
    state.predictions = res.predictions || {};
    document.getElementById('user-points').textContent = res.points + ' pt';
    renderChampionPicks();
    renderDeadline(res.championDeadline);
  } catch(e) { console.warn(e); }
}

async function loadMatches() {
  try {
    const res = await gasCall('getMatches');
    state.matches = res.matches || [];
    renderMatches();
  } catch(e) {
    document.getElementById('match-list').innerHTML =
      '<div class="loading" style="color:var(--red)">❌ โหลดแมตช์ไม่ได้ กรุณาลองใหม่</div>';
  }
}

// ══════════════════════════════════════════════
//  CHAMPION PICKS
// ══════════════════════════════════════════════
function renderDeadline(dt) {
  if (!dt) return;
  const d = new Date(dt);
  document.getElementById('champion-deadline').textContent =
    `⏰ เปลี่ยนได้ถึง: ${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'})}`;
}

function renderChampionPicks() {
  for (let i = 0; i < 2; i++) {
    const slot = document.getElementById(`pick-slot-${i+1}`);
    const pick = state.championPicks[i];
    if (pick) {
      slot.className = 'pick-slot filled';
      slot.innerHTML = `
        <span class="team-flag">${pick.flag}</span>
        <span class="team-name">${pick.name}</span>
        <span class="remove-btn" onclick="removePick(${i})">✕ เอาออก</span>
      `;
    } else {
      slot.className = 'pick-slot';
      slot.innerHTML = `<span class="slot-label">ทีมที่ ${i+1}</span>`;
    }
  }
}

function filterTeams(q) {
  const dd = document.getElementById('team-dropdown');
  if (!q) { dd.classList.remove('open'); return; }
  const filtered = TEAMS.filter(t => t.name.toLowerCase().includes(q.toLowerCase()));
  if (!filtered.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = filtered.map(t =>
    `<div class="team-option" onclick="selectTeam('${t.name}','${t.flag}')">
      <span>${t.flag}</span><span>${t.name}</span>
    </div>`
  ).join('');
  dd.classList.add('open');
}

function selectTeam(name, flag) {
  if (state.championPicks.find(p => p.name === name)) {
    showToast('⚠️ เลือกทีมนี้แล้ว', 'error'); return;
  }
  if (state.championPicks.length >= 2) {
    showToast('⚠️ เลือกได้แค่ 2 ทีม', 'error'); return;
  }
  state.championPicks.push({ name, flag });
  renderChampionPicks();
  document.getElementById('team-search').value = '';
  document.getElementById('team-dropdown').classList.remove('open');
}

function removePick(idx) {
  state.championPicks.splice(idx, 1);
  renderChampionPicks();
}

async function saveChampionPicks() {
  const btn = document.getElementById('save-champion-btn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังบันทึก...';
  try {
    await gasCall('saveChampionPicks', { picks: state.championPicks });
    showToast('✅ บันทึกทีมแชมป์แล้ว', 'success');
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 บันทึกทีมแชมป์';
  }
}

// ══════════════════════════════════════════════
//  LEADERBOARD
// ══════════════════════════════════════════════
let lbLoaded = false;
async function toggleLeaderboard() {
  const content = document.getElementById('leaderboard-content');
  const arrow = document.getElementById('lb-arrow');
  const open = content.classList.toggle('open');
  arrow.textContent = open ? '▲' : '▼';
  if (open && !lbLoaded) {
    lbLoaded = true;
    await loadLeaderboard();
  }
}

async function loadLeaderboard() {
  try {
    const res = await gasCall('getLeaderboard');
    state.leaderboard = res.leaderboard || [];
    renderLeaderboard();
  } catch(e) {
    document.getElementById('leaderboard-body').innerHTML =
      '<div class="loading" style="color:var(--red); padding:16px">❌ โหลดไม่ได้</div>';
  }
}

function renderLeaderboard() {
  const totalPot = state.leaderboard.reduce((s, u) => s + (u.paid || 0), 0);
  const prizes = [0.5, 0.3, 0.15];
  const rankClass = ['gold','silver','bronze'];
  const html = state.leaderboard.map((u, i) => {
    const prize = i < 3 ? `🏆 ฟันเงิน ${Math.floor(totalPot * prizes[i]).toLocaleString()} บาท` : '';
    return `
      <div class="lb-row">
        <div class="lb-rank ${rankClass[i] || ''}">${i+1}</div>
        <img class="lb-avatar" src="${u.picture || 'https://via.placeholder.com/36'}" onerror="this.src='https://via.placeholder.com/36'" />
        <div style="flex:1">
          <div class="lb-name">${u.name}</div>
          <div class="lb-stats">ทายถูก ${u.correctResults||0} คู่ | สกอร์ ${u.correctScores||0} คู่</div>
          ${prize ? `<div class="lb-prize">${prize}</div>` : ''}
        </div>
        <div class="lb-points">${u.points} pt</div>
      </div>
    `;
  }).join('');
  document.getElementById('leaderboard-body').innerHTML = html || '<div class="loading">ยังไม่มีข้อมูล</div>';
}

// ══════════════════════════════════════════════
//  MATCHES
// ══════════════════════════════════════════════
function filterMatches(f, btn) {
  state.currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches();
}

function renderMatches() {
  const list = document.getElementById('match-list');
  let matches = state.matches;

  if (state.currentFilter !== 'all') {
    matches = matches.filter(m => m.status === state.currentFilter);
  }

  if (!matches.length) {
    list.innerHTML = '<div class="loading">ไม่มีแมตช์ในหมวดนี้</div>';
    return;
  }

  list.innerHTML = matches.map(m => renderMatchCard(m)).join('');
}

function renderMatchCard(m) {
  const pred = state.predictions[m.id] || {};
  const isLive = m.status === 'live';
  const isFinished = m.status === 'finished';
  const canPredict = m.status === 'upcoming';

  const scoreOrVs = isLive || isFinished
    ? `<div class="score-display">${m.homeScore} - ${m.awayScore}</div>${isLive ? '<div style="font-size:11px;color:var(--red)">🔴 LIVE</div>' : ''}`
    : `<div class="score-vs">VS</div>`;

  const actionsHtml = canPredict ? `
    <div class="match-actions">
      <button class="predict-btn ${pred.result==='home'?'selected':''}" onclick="setPredResult('${m.id}','home','${m.homeName}')">🏠 ${m.homeName} ชนะ</button>
      <button class="predict-btn ${pred.result==='away'?'selected':''}" onclick="setPredResult('${m.id}','away','${m.awayName}')">✈️ ${m.awayName} ชนะ</button>
      <button class="predict-btn ${pred.result==='draw'?'selected':''}" onclick="setPredResult('${m.id}','draw','')" style="grid-column:span 2">🤝 เสมอ</button>
      <div class="predict-score-row">
        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="home-score-${m.id}" value="${pred.homeScore??''}" />
        <span class="score-dash">-</span>
        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="away-score-${m.id}" value="${pred.awayScore??''}" />
        <button class="save-match-btn" onclick="savePrediction('${m.id}')">✔ บันทึก</button>
      </div>
    </div>
  ` : '';

  const predictedHtml = pred.result ? `
    <div class="match-predicted">
      ✅ ทายไว้: ${pred.result === 'home' ? m.homeName + ' ชนะ' : pred.result === 'away' ? m.awayName + ' ชนะ' : 'เสมอ'}
      ${(pred.homeScore !== undefined && pred.awayScore !== undefined) ? `| สกอร์ ${pred.homeScore}-${pred.awayScore}` : ''}
    </div>
  ` : '';

  return `
    <div class="match-card" id="match-${m.id}">
      <div class="match-meta">
        <span>กลุ่ม ${m.group || 'TBD'} · รอบ ${m.round || '-'}</span>
        <span>${m.dateText || ''}</span>
      </div>
      <div class="match-teams">
        <div class="team-side">
          <span class="flag">${m.homeFlag || '🏳️'}</span>
          <div class="name">${m.homeName}</div>
        </div>
        <div class="score-center">${scoreOrVs}</div>
        <div class="team-side">
          <span class="flag">${m.awayFlag || '🏳️'}</span>
          <div class="name">${m.awayName}</div>
        </div>
      </div>
      ${predictedHtml}
      ${actionsHtml}
    </div>
  `;
}

function setPredResult(matchId, result, teamName) {
  if (!state.predictions[matchId]) state.predictions[matchId] = {};
  state.predictions[matchId].result = result;
  // Re-render just this card
  const m = state.matches.find(x => x.id === matchId);
  if (m) document.getElementById(`match-${matchId}`).outerHTML = renderMatchCard(m);
}

async function savePrediction(matchId) {
  const homeScore = document.getElementById(`home-score-${matchId}`)?.value;
  const awayScore = document.getElementById(`away-score-${matchId}`)?.value;
  const result = state.predictions[matchId]?.result;

  if (!result) { showToast('⚠️ เลือกผลก่อนนะ (ชนะ/แพ้/เสมอ)', 'error'); return; }

  state.predictions[matchId] = {
    result,
    homeScore: homeScore !== '' ? parseInt(homeScore) : undefined,
    awayScore: awayScore !== '' ? parseInt(awayScore) : undefined,
  };

  try {
    await gasCall('savePrediction', { matchId, prediction: state.predictions[matchId] });
    showToast('✅ บันทึกการทายแล้ว!', 'success');
    const m = state.matches.find(x => x.id === matchId);
    if (m) document.getElementById(`match-${matchId}`).outerHTML = renderMatchCard(m);
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  }
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

// Close team dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.team-search-wrap')) {
    document.getElementById('team-dropdown').classList.remove('open');
  }
});
</script>
